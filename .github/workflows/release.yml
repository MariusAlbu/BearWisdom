name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bw
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: bw.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: bw
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: bw

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p bearwisdom-cli

      - name: Build Web Server
        run: cargo build --release --target ${{ matrix.target }} -p bearwisdom-web

      - name: Build MCP Server
        run: cargo build --release --target ${{ matrix.target }} -p bearwisdom-mcp

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="bearwisdom-${VERSION}-${{ matrix.target }}"
          mkdir -p "${DIR}"
          cp target/${{ matrix.target }}/release/bw "${DIR}/"
          cp target/${{ matrix.target }}/release/bw-web "${DIR}/"
          cp target/${{ matrix.target }}/release/bw-mcp "${DIR}/"
          cp LICENSE-MIT README.md CHANGELOG.md "${DIR}/"
          tar czf "${DIR}.tar.gz" "${DIR}"
          echo "ASSET=${DIR}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="bearwisdom-${VERSION}-${{ matrix.target }}"
          mkdir -p "${DIR}"
          cp target/${{ matrix.target }}/release/bw.exe "${DIR}/"
          cp target/${{ matrix.target }}/release/bw-web.exe "${DIR}/"
          cp target/${{ matrix.target }}/release/bw-mcp.exe "${DIR}/"
          cp LICENSE-MIT README.md CHANGELOG.md "${DIR}/"
          7z a "${DIR}.zip" "${DIR}"
          echo "ASSET=${DIR}.zip" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
