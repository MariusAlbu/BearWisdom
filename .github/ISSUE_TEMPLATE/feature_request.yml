name: Feature Request
description: Suggest a new capability for the bear.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We're all ears (bear ears).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Language Support
        - Search / Query
        - Web Explorer
        - CLI
        - MCP Server
        - Connectors (framework detection)
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references — anything that helps paint the picture.
