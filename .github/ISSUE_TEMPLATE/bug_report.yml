name: Bug Report
description: Something isn't working right. Help the bear fix it.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! The more detail you provide, the faster we can track this down.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Run `bw open /path/to/project`
        2. Run `bw search-symbols /path/to/project "MyClass"`
        3. See error...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (bw)
        - Web Explorer (bw-web)
        - MCP Server (bw-mcp)
        - Core Library
        - Parser / Language Support
        - Search Engine
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: BearWisdom version
      description: Output of `bw --version`
      placeholder: "0.1.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 15 / Ubuntu 24.04"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, project size, languages involved — anything that helps.
